plugins {
    id 'java'
    id 'java-gradle-plugin'
    id 'maven-publish'
}

group = 'me.karjan'
version = '0.0.1-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation libs.junit
}

gradlePlugin {
    plugins {
        visitorGenerator {
            id = 'me.karjan.enumvisitorgenerator'
            implementationClass = 'me.karjan.enumvisitorgenerator.PluginImpl'
        }
    }
}
